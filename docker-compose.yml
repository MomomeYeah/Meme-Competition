name: meme-competition
services:
    mongodb:
        image: mongo:8
        container_name: MongoDB
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s
                
volumes:
    mongodb_data: